<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>PakuaFun — I Ching 3D</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js"
    }
  }
  </script>
</head>
<body>
  <div id="loading">PakuaFun</div>

  <canvas id="stars"></canvas>
  <div id="canvas-container"></div>


  <div id="result-panel">
    <div class="hex-header">
      <div class="hex-number" id="hex-number"></div>
      <div class="hex-name-chinese" id="hex-chinese"></div>
      <div class="hex-name-pinyin" id="hex-pinyin"></div>
      <div class="hex-name-english" id="hex-english"></div>
    </div>

    <div class="hex-lines" id="hex-lines"></div>

    <div class="hex-trigrams">
      <div class="hex-trigram-info" id="upper-trigram-info">
        <span class="label">superior</span>
        <span class="symbol" id="upper-symbol"></span>
        <span id="upper-name"></span>
      </div>
      <div class="hex-trigram-info" id="lower-trigram-info">
        <span class="label">inferior</span>
        <span class="symbol" id="lower-symbol"></span>
        <span id="lower-name"></span>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
